{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
   <link rel="stylesheet" href="{% static 'appstyling/foodapp.css' %}">
</head>
<body>

    <div class="restaurant-view">
      <div>
        <h1 class="logo">..FOODAPP..</h1>
      </div>

         <div class="corner-res">
           <div class="form-btn">
              <button><a href="{% url 'addrestaurant' %}">+Add</a></button>
          </div>
        <div class="search">
           <input type="text" placeholder="Search...">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                </svg>
        </div>
        </div>
        
    </div>
     <div class="line"></div>

     <div class="heading">
        <h1>Discover Restaurants</h1>
        <p>Restaurants for every mood and taste.Choose your favorite and order instantly.</p>
    </div>
     
     <div class="container mt-4">
    <div class="row">

        {% for i in view %}
        <div class="card  res-card" style="width: 18rem;">
          {% if i.image %}
            <img src="{{ i.image.url }}" class="card-image-top" alt="...">
          {% else %}
            No Image
          {% endif %}
        <div class="res-body">
            <h3 class="res-title">{{ i.restaurant_name }}</h3>
             <h5 class="amount">{{ i.location }}</h5>
          </div>
          <div class="view-btn">
            <a href="{% url 'viewmenu' i.id %}"><button>View Menu</button></a>
          </div>
          
        </div>
      {% endfor %}

  </div>
  </div>


</body>
</html>
