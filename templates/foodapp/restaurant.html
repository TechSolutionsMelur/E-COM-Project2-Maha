{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
   <link rel="stylesheet" href="{% static 'appstyling/foodapp.css' %}">
</head>
<body>

    <div class="restaurant-view">
        <div class="form-btn">
          <button><a href="{% url 'addrestaurant' %}">+ Add Restaurant</a></button>
        </div>

        <div class="heading">
          <h1>Restaurant List</h1>
        </div>
        
        <div class="cartlist">
          <button>CART</button>
        </div>
    </div>

    <div class="line"></div>

     <div class="search">
          <input type="text">
          <button>Search</button>
        </div>
     
     <div class="container mt-4">
    <div class="row">

        {% for i in view %}
        <div class="card  food-card" style="width: 18rem;">
          {% if i.image %}
            <img src="{{ i.image.url }}" class="card-img-top" alt="...">
          {% else %}
            No Image
          {% endif %}
        <div class="card-body">
            <h3 class="card-title">{{ i.restaurant_name }}</h3>
             <h5 class="amount">{{ i.location }}</h5>
          </div>
          <a href="{% url 'viewmenu' i.id %}"><button>view Items</button></a>
        </div>
      {% endfor %}

  </div>
  </div>


</body>
</html>
